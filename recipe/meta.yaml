{% set version = "0.4-14" %}
{% set posix = 'm2-' if win else '' %}

package:
  name: r-pixmap
  version: {{ version|replace("-", "_") }}

source:
  url:
    - {{ cran_mirror }}/src/contrib/pixmap_{{ version }}.tar.gz
    - {{ cran_mirror }}/src/contrib/Archive/pixmap/pixmap_{{ version }}.tar.gz
  sha256: 26710c931f95b89b66b50e3ee1c4b6e1ba383b8067f80b3d7de2f0d58cb9fa9e

build:
  number: 0
  noarch: generic
  rpaths:
    - lib/R/lib/
    - lib/

requirements:
  build:
    - {{ posix }}zip               # [win]
  host:
    - r-base
  run:
    - r-base

test:
  commands:
    - $R -e "library('pixmap')"           # [not win]
    - "\"%R%\" -e \"library('pixmap')\""  # [win]

about:
  home: https://CRAN.R-project.org/package=pixmap
  license: GPL-2.0-only
  summary: Functions for import, export, plotting and other manipulations of bitmapped images.
  license_family: GPL2
  license_file:
    - {{ environ["PREFIX"] }}/lib/R/share/licenses/GPL-2

extra:
  recipe-maintainers:
    - conda-forge/r
    - MathiasHaudgaard
    - FrodePedersen
    - ArneKr
